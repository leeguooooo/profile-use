name: ProfileUse
options:
  bundleIdPrefix: com.profileuse
  deploymentTarget:
    macOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEAD_CODE_STRIPPING: "YES"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"
targets:
  ProfileUse:
    type: application
    platform: macOS
    sources:
      - path: ProfileUse/App
      - path: ProfileUse/Core
      - path: ProfileUse/UI
      - path: ../scripts/profile_use.py
        buildPhase: resources
    info:
      path: ProfileUse/App/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "26.0"
        LSUIElement: true
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.profileuse.app
        PRODUCT_NAME: ProfileUse
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: "YES"
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Reveal and edit sensitive profile fields."
